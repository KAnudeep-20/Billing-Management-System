# ==================== Test Configuration ====================
# Uses H2 in-memory database — no Supabase dependency for tests.

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: false

logging:
  level:
    com.aibilling: DEBUG
